    DeferralRecord:
      type: object
      description: >-
        Behavioural metadata only. Contains a reference to the Outlook
        message and which weeks the planner could not place it. NEVER
        contains subject, body, sender, or any email content.
      properties:
        outlookEmailId:
          type: string
          description: Microsoft Graph message ID — reference only, not content
        isoWeeks:
          type: array
          items:
            type: string
            description: ISO 'YYYY-MM-DD' Monday string
        deferralCount:
          type: integer
          description: Denormalised isoWeeks.length, kept in sync server-side
      required:
        - outlookEmailId
        - isoWeeks
        - deferralCount
    RecordDeferralsInput:
      type: object
      properties:
        outlookEmailIds:
          type: array
          items:
            type: string
          minItems: 1
        weekMonday:
          type: string
          description: ISO 'YYYY-MM-DD' Monday string for the planning window
      required:
        - outlookEmailIds
        - weekMonday
    ArchiveKind:
      type: string
      enum: [acknowledged, done]
    ArchivedRecord:
      type: object
      description: >-
        Behavioural metadata only — reference to the Outlook message,
        the archive reason, and when it was archived. NEVER contains
        email content.
      properties:
        outlookEmailId:
          type: string
          description: Microsoft Graph message ID — reference only
        kind:
          $ref: "#/components/schemas/ArchiveKind"
        archivedAt:
          type: string
          format: date-time
      required:
        - outlookEmailId
        - kind
        - archivedAt
    ArchiveEmailInput:
      type: object
      properties:
        outlookEmailId:
          type: string
        kind:
          $ref: "#/components/schemas/ArchiveKind"
      required:
        - outlookEmailId
        - kind
    AcknowledgeEmailInput:
      type: object
      properties:
        outlookEmailId:
          type: string
      required:
        - outlookEmailId
    UserTaskSource:
      type: string
      enum: [cpd, manual]
    UserTaskRecord:
      type: object
      description: >-
        A clinician-added task. Stores their own organisational data
        (chosen title, optional dates). Never email body content.
      properties:
        id:
          type: string
          description: Client-generated 'ut_<base36>_<rand>'
        outlookEmailId:
          type: string
          nullable: true
          description: Source email reference; null for manual tasks
        title:
          type: string
        source:
          $ref: "#/components/schemas/UserTaskSource"
        eventDate:
          type: string
          nullable: true
          description: ISO YYYY-MM-DD; CPD event start
        registrationDeadline:
          type: string
          nullable: true
          description: ISO YYYY-MM-DD; CPD registration cut-off
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - source
        - createdAt
    TaskRisk:
      type: string
      enum: [high, medium, low]
    LinkedDocTaskRecord:
      type: object
      description: >-
        Document task auto-created for emails the classifier flagged as
        requiring a written document. Title is a short organisational
        label; no email body text is stored.
      properties:
        outlookEmailId:
          type: string
        title:
          type: string
        cat:
          type: string
        type:
          type: string
        deadline:
          type: integer
        risk:
          $ref: "#/components/schemas/TaskRisk"
        estMin:
          type: integer
        autoCompleteOnReply:
          type: boolean
        done:
          type: boolean
        noteAfterEmailDone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - outlookEmailId
        - title
        - cat
        - type
        - deadline
        - risk
        - estMin
        - autoCompleteOnReply
        - done
        - createdAt
    PromptedTaskRecord:
      type: object
      description: >-
        An accepted "Possible task detected" prompt — the clinician's
        edited and saved form values. The pre-edit AI suggestion is
        never stored; only what the clinician approved.
      properties:
        taskId:
          type: string
          description: Client-generated 'pt_<emailId>_<kind>_<base36>'
        outlookEmailId:
          type: string
        kind:
          type: string
        title:
          type: string
        type:
          type: string
        estMin:
          type: integer
        priority:
          $ref: "#/components/schemas/TaskRisk"
        patientName:
          type: string
          nullable: true
        dueDays:
          type: integer
          nullable: true
        notes:
          type: string
        done:
          type: boolean
        controlledDrug:
          type: boolean
          nullable: true
        medicationName:
          type: string
          nullable: true
        medicationDose:
          type: string
          nullable: true
        travelMentioned:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - taskId
        - outlookEmailId
        - kind
        - title
        - type
        - estMin
        - priority
        - notes
        - done
        - createdAt
    PromptedTaskDismissalKey:
      type: object
      properties:
        outlookEmailId:
          type: string
        kind:
          type: string
      required:
        - outlookEmailId
        - kind
    PromptedTasksState:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/PromptedTaskRecord"
        dismissed:
          type: array
          items:
            $ref: "#/components/schemas/PromptedTaskDismissalKey"
      required:
        - tasks
        - dismissed
    DismissPromptedTaskInput:
      type: object
      properties:
        outlookEmailId:
          type: string
        kind:
          type: string
      required:
        - outlookEmailId
        - kind
    SetPromptedTaskDoneInput:
      type: object
      properties:
        outlookEmailId:
          type: string
        kind:
          type: string
        done:
          type: boolean
      required:
        - outlookEmailId
        - kind
        - done
    AiClassificationRecord:
      type: object
      description: >-
        AI classification for a single email. All fields are
        organisational metadata. Nullable fields use null (not
        omission) so the upsert always replaces the row cleanly.
      properties:
        outlookEmailId:
          type: string
        category:
          type: string
          enum: [SAFEGUARDING, URGENT_CLINICAL, CLINICAL, PROFESSIONAL, ADMIN, LEGAL, NONE, CPD, UNCLEAR]
        priority:
          type: string
          enum: [URGENT, MEDIUM, LOW, UNCLEAR]
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        reasoning:
          type: string
        classifiedAt:
          type: string
          format: date-time
        professionalSubType:
          type: string
          enum: [clinical_input, document_request, meeting]
          nullable: true
        patientName:
          type: string
          nullable: true
        documentRequested:
          type: string
          nullable: true
        eventDate:
          type: string
          nullable: true
        registrationDeadline:
          type: string
          nullable: true
        documentDirection:
          type: string
          enum: [incoming, outgoing, unclear]
          nullable: true
        requiresDocument:
          type: boolean
        documentType:
          type: string
          nullable: true
        documentDueDays:
          type: integer
          nullable: true
        prescriptionRequest:
          description: PrescriptionRequest object or null. JSON passthrough.
          nullable: true
        complexity:
          type: string
          enum: [simple, complex]
          nullable: true
        complexityReasons:
          type: array
          items:
            type: string
      required:
        - outlookEmailId
        - category
        - priority
        - confidence
        - reasoning
        - classifiedAt
        - professionalSubType
        - patientName
        - documentRequested
        - eventDate
        - registrationDeadline
        - documentDirection
        - requiresDocument
        - documentType
        - documentDueDays
        - prescriptionRequest
        - complexity
        - complexityReasons
    SentLogVariant:
      type: string
      enum: [single, family, admin, chat, unknown]
    SentLogRecord:
      type: object
      description: >-
        Mailto handoff audit row. Metadata only — outgoing email
        content (subject, body) lives in Outlook Sent Items and is
        never persisted here.
      properties:
        id:
          type: string
          description: Client-generated 's_<base36>_<rand>' (globally unique)
        outlookEmailId:
          type: string
          description: Source email being replied to
        variant:
          $ref: "#/components/schemas/SentLogVariant"
        sentAt:
          type: string
          format: date-time
          description: When the mailto handoff fired
      required:
        - id
        - outlookEmailId
        - variant
        - sentAt
    ClinicianSettings:
      type: object
      description: >-
        Envelope of all clinician-wide settings. Each section is a
        free-form object so the client owns the inner shape; null
        means the section has never been customised.
      properties:
        arrivalsConfig:
          type: object
          nullable: true
          additionalProperties: true
        styleProfile:
          type: object
          nullable: true
          additionalProperties: true
        signaturesSettings:
          type: object
          nullable: true
          additionalProperties: true
        appSettings:
          type: object
          nullable: true
          additionalProperties: true
      required:
        - arrivalsConfig
        - styleProfile
        - signaturesSettings
        - appSettings
    UpsertClinicianSettingsInput:
      type: object
      description: >-
        Partial patch. Each section is independently optional;
        omitted leaves the existing value alone, explicit null
        clears it. The server merges the patch over the row.
      properties:
        arrivalsConfig:
          type: object
          nullable: true
          additionalProperties: true
        styleProfile:
          type: object
          nullable: true
          additionalProperties: true
        signaturesSettings:
          type: object
          nullable: true
          additionalProperties: true
        appSettings:
          type: object
          nullable: true
          additionalProperties: true
    WeekSetup:
      type: object
      description: >-
        Per-week planner snapshot. The clinician's chosen capacity
        for the week (hours, days, session length) plus the
        GeneratedPlan the planner produced from those inputs. Only
        clinician-authored summaries derived from email metadata
        appear in `plan` — never raw email body or sender content.
      properties:
        hours:
          type: number
          description: Total admin hours allocated for this week
        days:
          type: array
          items:
            type: string
          description: Day labels the clinician marked as admin time (e.g. ["Tue","Thu"])
        plan:
          type: object
          nullable: true
          additionalProperties: true
          description: GeneratedPlan blob (days/blocks/deferredItems/safetyNote/...). Null until the planner has run.
        sessionLengthMin:
          type: number
          description: Preferred admin session length in minutes (e.g. 90)
        minutesByDay:
          type: object
          additionalProperties:
            type: number
          description: Optional per-day minute overrides; days not listed fall back to the even split.
      required:
        - hours
        - days
      additionalProperties: true
    WeeklyPlanRecord:
      type: object
      description: GET response — the requested weekKey plus its WeekSetup, or null when the planner has not run for that week yet.
      properties:
        weekKey:
          type: string
          description: ISO-style identifier "YYYY-NN" (e.g. "2026-21")
        setup:
          allOf:
            - $ref: "#/components/schemas/WeekSetup"
          nullable: true
      required:
        - weekKey
        - setup
    ManualTaskOverride:
      type: object
      description: One row of manual_task_overrides.
      properties:
        taskId:
          type: string
          description: Seed ManualTask id (e.g. "m2")
        done:
          type: boolean
        note:
          type: string
          nullable: true
          description: Optional clinician-authored note attached when keeping a task open after the linked email is done.
      required:
        - taskId
        - done
        - note
    ManualTaskOverridePatch:
      type: object
      description: "Partial patch — omit a field to leave it alone, send note=null to clear."
      properties:
        done:
          type: boolean
        note:
          type: string
          nullable: true
      additionalProperties: false
    SidebarTaskInput:
      type: object
      description: Full sidebar task body for upsert.
      properties:
        title:
          type: string
          minLength: 1
        estMin:
          type: integer
          minimum: 0
        priority:
          type: string
          enum: [high, normal]
        done:
          type: boolean
      required:
        - title
        - estMin
        - priority
        - done
      additionalProperties: false
    SidebarTask:
      type: object
      description: GET response — sidebar task with its server-assigned createdAt.
      properties:
        id:
          type: string
        title:
          type: string
        estMin:
          type: integer
        priority:
          type: string
          enum: [high, normal]
        done:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - estMin
        - priority
        - done
        - createdAt
    EvidenceSource:
      type: object
      description: >-
        Metadata pointer to a clinical guideline. Stores tier, source
        name, title, year, URL and maintenance signals — never the
        guideline content itself.
      properties:
        id:
          type: integer
        tier:
          type: integer
          enum: [1, 2, 3, 4, 5]
        sourceName:
          type: string
        title:
          type: string
        year:
          type: integer
        url:
          type: string
        isAustralian:
          type: boolean
        specialty:
          type: ["string", "null"]
        publiclyAccessible:
          type: boolean
          description: >-
            False when the document sits behind a paywall, login wall or
            is not machine-readable. Stage 3 falls back to a
            metadata-only citation with a "refer to source directly"
            note.
        lastVerifiedUrl:
          type: ["string", "null"]
          format: date-time
          description: Date we last confirmed the URL resolves (link-rot signal).
      required:
        - id
        - tier
        - sourceName
        - title
        - year
        - url
        - isAustralian
        - publiclyAccessible
    EmailEvidenceCitation:
      type: object
      description: >-
        One citation entry — a reference into the source registry plus
        the per-link concordance flag for this email.
      properties:
        sourceId:
          type: integer
        flag:
          type: ["string", "null"]
          enum: [A, B, C, D, tier5, null]
        flagText:
          type: ["string", "null"]
      required:
        - sourceId
        - flag
    EmailEvidence:
      type: object
      description: >-
        Per-email evidence record. Citations are an ordered array of
        registry references. prescribingWarning is the clinician's (or
        AI's) characterisation of the prescribing risk — not guideline
        content.
      properties:
        outlookEmailId:
          type: string
        prescribingWarning:
          type: ["string", "null"]
        citations:
          type: array
          items:
            $ref: "#/components/schemas/EmailEvidenceCitation"
        aiCheckedNoMatch:
          type: boolean
          description: >-
            True when the AI source-matcher (Stage 3) ran for this email
            and honestly found no relevant source in the registry. When
            true, citations is permitted to be empty and the matcher
            will not re-ask. Defaults to false for seeded / clinician-
            authored rows.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - outlookEmailId
        - prescribingWarning
        - citations
        - aiCheckedNoMatch
        - createdAt
        - updatedAt
    EmailEvidenceInput:
      type: object
      description: Upsert body for PUT /email-evidence/{outlookEmailId}.
      properties:
        prescribingWarning:
          type: ["string", "null"]
        citations:
          type: array
          items:
            $ref: "#/components/schemas/EmailEvidenceCitation"
        aiCheckedNoMatch:
          type: boolean
          description: >-
            Set to true to record that the AI matcher ran and found no
            relevant source. Required when citations is empty.
      required:
        - prescribingWarning
        - citations
        - aiCheckedNoMatch
