openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: anthropic
    description: Anthropic AI chat operations
  - name: clinadmin
    description: ClinAdmin AI operations
  - name: deferrals
    description: Per-email deferral history (planning-window tracking)
  - name: archived
    description: Per-email archive state (acknowledged or done)
  - name: acknowledged
    description: Per-email "seen, no action needed" flag
  - name: userTasks
    description: Clinician-added tasks (CPD one-click, future manual entries)
  - name: linkedDocTasks
    description: Auto-created document tasks for emails flagged as requiring a written document
  - name: promptedTasks
    description: Clinician's response to "Possible task detected" inbox prompts
  - name: sentLog
    description: Audit trail of mailto handoffs (metadata only — no subject or body)
  - name: aiClassifications
    description: AI category / priority / detector output per inbox email (organisational metadata, not email content)
  - name: clinicianSettings
    description: Clinician-wide configuration (arrivals planner inputs, writing-style profile, AI-reply signatures)
  - name: weeklyPlans
    description: Per-week planner snapshot (chosen hours/days/session length plus the generated plan for that ISO week)
  - name: manualTaskOverrides
    description: Per-clinician overrides on the static seed ManualTask records (done flag, optional kept-open note)
  - name: sidebarTasks
    description: Quick-checklist items the clinician adds in the sidebar (full CRUD)
  - name: evidenceSources
    description: Registry of clinical guideline pointers (metadata only; AI fetches live at query time)
  - name: emailEvidence
    description: Per-email evidence citations — references into the source registry, never guideline content
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /clinadmin/ai/complete:
    post:
      operationId: aiComplete
      tags: [clinadmin]
      summary: Run an AI completion for ClinAdmin features
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCompleteInput"
      responses:
        "200":
          description: AI completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCompleteResult"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
  /deferrals:
    get:
      operationId: listDeferrals
      tags: [deferrals]
      summary: List every email's deferral history for the current clinician
      description: >-
        Returns metadata only — no email content. Subject, body, and
        sender are fetched live from Microsoft Graph at display time
        using outlookEmailId.
      responses:
        "200":
          description: All deferral records for the current clinician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeferralRecord"
  /deferrals/record:
    post:
      operationId: recordDeferrals
      tags: [deferrals]
      summary: Record that one or more emails were deferred in a given ISO week
      description: >-
        Idempotent: recording the same (outlookEmailId, weekMonday) pair more
        than once adds only one entry. deferralCount is recomputed server-side
        as isoWeeks.length on every write.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordDeferralsInput"
      responses:
        "204":
          description: Recorded
  /deferrals/{outlookEmailId}:
    delete:
      operationId: deleteDeferral
      tags: [deferrals]
      summary: Remove an email's entire deferral history
      description: >-
        Called when the email is archived, acknowledged, or marked done.
        The deferral warning is meaningful only on active unresolved emails,
        so resolution clears the record completely.
      parameters:
        - name: outlookEmailId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted (idempotent — 204 even if no record existed)
  /archived:
    get:
      operationId: listArchived
      tags: [archived]
      summary: List every archived email for the current clinician
      description: >-
        Returns metadata only — no email content. Subject, body, and
        sender are fetched live from Microsoft Graph at display time
        using outlookEmailId.
      responses:
        "200":
          description: All archive entries for the current clinician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchivedRecord"
    post:
      operationId: archiveEmail
      tags: [archived]
      summary: Archive an email (acknowledged or done)
      description: >-
        Idempotent — re-archiving the same email updates the kind and
        archivedAt to "now". Server stores reference + kind only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchiveEmailInput"
      responses:
        "204":
          description: Archived
  /archived/{outlookEmailId}:
    delete:
      operationId: unarchiveEmail
      tags: [archived]
      summary: Remove an email from the archive
      parameters:
        - name: outlookEmailId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Unarchived (idempotent — 204 even if no record existed)
  /acknowledged:
    get:
      operationId: listAcknowledged
      tags: [acknowledged]
      summary: List every acknowledged email for the current clinician
      description: >-
        Returns reference IDs only — no email content. The
        "acknowledged" flag is purely behavioural (the clinician saw
        this email and chose not to act on it).
      responses:
        "200":
          description: All acknowledged email IDs for the current clinician
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  description: Microsoft Graph message ID — reference only
    post:
      operationId: acknowledgeEmail
      tags: [acknowledged]
      summary: Mark an email as acknowledged
      description: Idempotent — re-acknowledging is a no-op.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeEmailInput"
      responses:
        "204":
          description: Acknowledged
  /acknowledged/{outlookEmailId}:
    delete:
      operationId: unacknowledgeEmail
      tags: [acknowledged]
      summary: Clear the acknowledged flag for an email
      parameters:
        - name: outlookEmailId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Cleared (idempotent — 204 even if no record existed)
  /user-tasks:
    get:
      operationId: listUserTasks
      tags: [userTasks]
      summary: List every clinician-added task
      description: >-
        Returns the clinician's task list (CPD one-click adds today, manual
        entries in future). Stores their own organisational data only — no
        email body content. outlookEmailId is a reference back to the source
        email when the task was created from one.
      responses:
        "200":
          description: All user tasks for the current clinician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserTaskRecord"
    post:
      operationId: createUserTask
      tags: [userTasks]
      summary: Add a task to the clinician's task list
      description: >-
        Idempotent on `id` — re-posting the same id is a no-op (the
        client generates the id locally so it knows it immediately and
        can fire-and-forget the POST).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserTaskRecord"
      responses:
        "204":
          description: Created
  /user-tasks/{id}:
    delete:
      operationId: deleteUserTask
      tags: [userTasks]
      summary: Remove a task from the clinician's task list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted (idempotent — 204 even if no record existed)
  /linked-doc-tasks:
    get:
      operationId: listLinkedDocTasks
      tags: [linkedDocTasks]
      summary: List every linked document task for the current clinician
      description: >-
        Document task = task auto-created when the classifier flags an
        email as requiring a written document. Title is a short
        organisational label ("EHCP Letter — Jamie B — requested by Mrs
        Davies"); no email body text is stored.
      responses:
        "200":
          description: All linked-doc tasks for the current clinician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkedDocTaskRecord"
    post:
      operationId: upsertLinkedDocTask
      tags: [linkedDocTasks]
      summary: Create or update a linked document task
      description: >-
        Idempotent on (clinicianId, outlookEmailId). Used both for
        initial creation and for mutations to `done` / note. Server
        replaces the whole row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkedDocTaskRecord"
      responses:
        "204":
          description: Saved
  /linked-doc-tasks/{outlookEmailId}:
    delete:
      operationId: deleteLinkedDocTask
      tags: [linkedDocTasks]
      summary: Remove a linked document task
      parameters:
        - name: outlookEmailId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted (idempotent — 204 even if no record existed)
  /prompted-tasks:
    get:
      operationId: listPromptedTasks
      tags: [promptedTasks]
      summary: List the clinician's responses to "Possible task detected" prompts
      description: >-
        Returns two arrays — accepted tasks (with the clinician's saved
        form values) and dismissed prompt keys. Implicit-dismiss-on-accept
        is captured by the same row; an accepted entry also suppresses
        the prompt for that (email, kind).
      responses:
        "200":
          description: Accepted tasks and dismissed prompt keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptedTasksState"
    post:
      operationId: acceptPromptedTask
      tags: [promptedTasks]
      summary: Save an accepted (clinician-edited) prompted task
      description: >-
        Idempotent on (clinicianId, outlookEmailId, kind) — re-posting
        is a no-op (matches the client's hasPromptedTaskForKind dedupe).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptedTaskRecord"
      responses:
        "204":
          description: Saved
  /prompted-tasks/dismiss:
    post:
      operationId: dismissPromptedTask
      tags: [promptedTasks]
      summary: Record that the clinician rejected a "Possible task" prompt
      description: >-
        Idempotent — if a row already exists for (email, kind) (accepted
        or dismissed) the call is a no-op so we never overwrite a saved
        accepted task with a dismissal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissPromptedTaskInput"
      responses:
        "204":
          description: Recorded
  /prompted-tasks/done:
    post:
      operationId: setPromptedTaskDoneApi
      tags: [promptedTasks]
      summary: Toggle the `done` flag on an accepted prompted task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPromptedTaskDoneInput"
      responses:
        "204":
          description: Updated (no-op if the row doesn't exist or isn't accepted)
  /sent-log:
    get:
      operationId: listSentLog
      tags: [sentLog]
      summary: List every mailto handoff for the current clinician
      description: >-
        Audit trail of replies handed off to the user's mail client.
        Three-bucket rule: outgoing email content lives in Outlook
        Sent Items, not here. The persisted record contains only
        organisational metadata (id, source email reference, draft
        variant, timestamp). No subject line and no body — not even
        a snippet.
      responses:
        "200":
          description: All sent-log entries for the current clinician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SentLogRecord"
    post:
      operationId: recordSentLog
      tags: [sentLog]
      summary: Record a new mailto handoff
      description: >-
        Idempotent on `id` — re-posting the same payload is a no-op,
        which makes the client's fire-and-forget POST safe to retry
        on transient network failure. Note: each click generates a
        fresh `id`, so two genuine clicks on Send are two rows
        (correctly — that's two handoffs).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SentLogRecord"
      responses:
        "204":
          description: Recorded
  /ai-classifications:
    get:
      operationId: listAiClassifications
      tags: [aiClassifications]
      summary: List every AI classification for the current clinician
      description: >-
        Per-email AI decisions: category, priority, confidence,
        detector outputs and reasoning text. Three-bucket rule —
        this is the clinician's organisational metadata, not email
        content. Subject and body remain fetched live from Microsoft
        Graph at display time.
      responses:
        "200":
          description: All AI classifications for the current clinician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiClassificationRecord"
    post:
      operationId: upsertAiClassification
      tags: [aiClassifications]
      summary: Insert or update an AI classification
      description: >-
        Idempotent on (clinicianId, outlookEmailId). The server
        replaces the row wholesale — used both for the initial
        bootstrap classification and for clinician-driven mutations
        (manual override, document direction confirmation,
        re-classify).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiClassificationRecord"
      responses:
        "204":
          description: Saved
  /clinician-settings:
    get:
      operationId: getClinicianSettings
      tags: [clinicianSettings]
      summary: Get all clinician-wide settings (arrivals, style profile, signatures)
      description: >-
        Returns the three configuration blobs as one envelope. Any
        unset section is `null`; readers fall back to client-side
        defaults. Three-bucket rule: every field is the clinician's
        own organisational layer (planner inputs, prompt-tuning
        text, sign-offs they author). No correspondence is stored.
      responses:
        "200":
          description: Current clinician settings (sections may be null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicianSettings"
    post:
      operationId: upsertClinicianSettings
      tags: [clinicianSettings]
      summary: Patch one or more sections of the clinician's settings
      description: >-
        Partial upsert. Each section is independently optional —
        omitted means "leave alone", explicit `null` means "clear".
        Idempotent on clinicianId; the server merges the patch over
        the existing row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertClinicianSettingsInput"
      responses:
        "204":
          description: Saved
  /weekly-plans/{weekKey}:
    get:
      operationId: getWeeklyPlan
      tags: [weeklyPlans]
      summary: Get the planner snapshot for one ISO week
      description: >-
        Returns the WeekSetup the clinician saved for `weekKey`
        (chosen hours/days/session length plus the generated plan).
        Body's `setup` is `null` when the planner has not run for
        this week yet — the caller treats that as "show the weekly
        setup modal".
      parameters:
        - name: weekKey
          in: path
          required: true
          description: ISO-style identifier "YYYY-NN" (e.g. "2026-21")
          schema:
            type: string
      responses:
        "200":
          description: Snapshot for the requested week (setup may be null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlanRecord"
    post:
      operationId: upsertWeeklyPlan
      tags: [weeklyPlans]
      summary: Save the planner snapshot for one ISO week
      description: >-
        Idempotent upsert keyed on (clinicianId, weekKey). Body is
        the full WeekSetup; replaces any existing snapshot for the
        same week. The plan field carries clinician-authored
        summaries derived from email metadata, never raw email body
        or sender content.
      parameters:
        - name: weekKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeekSetup"
      responses:
        "204":
          description: Saved
    delete:
      operationId: deleteWeeklyPlan
      tags: [weeklyPlans]
      summary: Remove the planner snapshot for one ISO week
      description: Idempotent — returns 204 even if no snapshot existed.
      parameters:
        - name: weekKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /manual-task-overrides:
    get:
      operationId: listManualTaskOverrides
      tags: [manualTaskOverrides]
      summary: List every override on the seed ManualTask records
      description: >-
        Returns one row per (taskId) for which the clinician has
        ticked done or attached a kept-open note. Unmodified seed
        tasks have no row and use seed defaults at render time.
      responses:
        "200":
          description: Override list (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManualTaskOverride"
  /manual-task-overrides/{taskId}:
    post:
      operationId: upsertManualTaskOverride
      tags: [manualTaskOverrides]
      summary: Patch a single ManualTask's override
      description: >-
        Idempotent upsert keyed on (clinicianId, taskId). Body is a
        partial — omitted fields stay as they are; explicit `null`
        on `note` clears it. `done` defaults to false on first
        insert if not provided.
      parameters:
        - name: taskId
          in: path
          required: true
          description: Seed ManualTask id (e.g. "m2")
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualTaskOverridePatch"
      responses:
        "204":
          description: Saved
    delete:
      operationId: deleteManualTaskOverride
      tags: [manualTaskOverrides]
      summary: Clear a ManualTask's override (back to seed defaults)
      description: Idempotent — returns 204 even when no override existed.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /sidebar-tasks:
    get:
      operationId: listSidebarTasks
      tags: [sidebarTasks]
      summary: List sidebar quick-checklist items
      responses:
        "200":
          description: Sidebar tasks ordered by createdAt ascending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SidebarTask"
  /sidebar-tasks/{id}:
    post:
      operationId: upsertSidebarTask
      tags: [sidebarTasks]
      summary: Create or replace a sidebar task
      description: >-
        Idempotent upsert keyed on (clinicianId, id). Body is the
        full row; toggling done is just a re-post with the flag
        flipped. Mirrors the weekly_plans upsert pattern.
      parameters:
        - name: id
          in: path
          required: true
          description: Client-generated id ("s<timestamp>")
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SidebarTaskInput"
      responses:
        "204":
          description: Saved
    delete:
      operationId: deleteSidebarTask
      tags: [sidebarTasks]
      summary: Remove a sidebar task
      description: Idempotent — returns 204 even when no row existed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /evidence-sources:
    get:
      operationId: listEvidenceSources
      tags: [evidenceSources]
      summary: List every entry in the clinical-source registry
      description: >-
        Returns metadata pointers only — tier, source name, title, year,
        URL, AU flag, publicly_accessible, last_verified_url. The
        guideline content itself is never stored; Stage 3 fetches the
        live document from the URL at query time.
      responses:
        "200":
          description: All evidence sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvidenceSource"
  /email-evidence:
    get:
      operationId: listEmailEvidence
      tags: [emailEvidence]
      summary: List every per-email evidence record for the current clinician
      responses:
        "200":
          description: All email-evidence records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailEvidence"
  /email-evidence/{outlookEmailId}:
    get:
      operationId: getEmailEvidence
      tags: [emailEvidence]
      summary: Get the evidence citations for one email
      parameters:
        - name: outlookEmailId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evidence record for this email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailEvidence"
        "404":
          description: No evidence linked to this email yet
    put:
      operationId: upsertEmailEvidence
      tags: [emailEvidence]
      summary: Create or replace the evidence citations for one email
      description: >-
        Idempotent on (clinicianId, outlookEmailId). Used both by the
        seeder script today and by the Stage 3 AI step later. Server
        replaces the whole row including the ordered citations array.
      parameters:
        - name: outlookEmailId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailEvidenceInput"
      responses:
        "204":
          description: Saved
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AiCompleteInput:
      type: object
      properties:
        systemPrompt:
          type: string
        prompt:
          type: string
        maxTokens:
          type: integer
      required:
        - prompt
    AiCompleteResult:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    AiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
