openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: anthropic
    description: Anthropic AI chat operations
  - name: clinadmin
    description: ClinAdmin AI operations
  - name: deferrals
    description: Per-email deferral history (planning-window tracking)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /clinadmin/ai/complete:
    post:
      operationId: aiComplete
      tags: [clinadmin]
      summary: Run an AI completion for ClinAdmin features
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCompleteInput"
      responses:
        "200":
          description: AI completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCompleteResult"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
  /deferrals:
    get:
      operationId: listDeferrals
      tags: [deferrals]
      summary: List every email's deferral history
      responses:
        "200":
          description: All deferral records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeferralRecord"
  /deferrals/record:
    post:
      operationId: recordDeferrals
      tags: [deferrals]
      summary: Record that one or more emails were deferred in a given ISO week
      description: >-
        Idempotent: recording the same (emailId, weekMonday) pair more than
        once adds only one entry. Counts only ever increase across distinct
        weeks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordDeferralsInput"
      responses:
        "204":
          description: Recorded
  /deferrals/{emailId}:
    delete:
      operationId: deleteDeferral
      tags: [deferrals]
      summary: Remove an email's entire deferral history
      description: >-
        Called when the email is archived, acknowledged, or marked done.
        The deferral warning is meaningful only on active unresolved emails,
        so resolution clears the record completely.
      parameters:
        - name: emailId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted (idempotent — 204 even if no record existed)
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AiCompleteInput:
      type: object
      properties:
        systemPrompt:
          type: string
        prompt:
          type: string
        maxTokens:
          type: integer
      required:
        - prompt
    AiCompleteResult:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    AiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    AnthropicConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    AnthropicMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    DeferralRecord:
      type: object
      properties:
        emailId:
          type: integer
        weeksDeferred:
          type: array
          items:
            type: string
            description: ISO 'YYYY-MM-DD' Monday string
      required:
        - emailId
        - weeksDeferred
    RecordDeferralsInput:
      type: object
      properties:
        emailIds:
          type: array
          items:
            type: integer
          minItems: 1
        weekMonday:
          type: string
          description: ISO 'YYYY-MM-DD' Monday string for the planning window
      required:
        - emailIds
        - weekMonday
